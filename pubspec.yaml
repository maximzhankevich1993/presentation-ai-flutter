name: presentation_ai
description: Презентатор ИИ - создание презентаций с помощью искусственного интеллекта
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Screen Adaptation
  flutter_screenutil: ^5.9.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.0.0
  
  # Image & File Handling
  image_picker: ^1.0.5
  file_picker: ^6.1.1
  
  # PDF & Export
  printing: ^5.11.1
  pdf: ^3.10.7
  
  # Charts & Graphs
  fl_chart: ^0.66.0
  
  # Animations
  lottie: ^2.7.0
  
  # Social Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  flutter_vk_auth: ^1.2.0
  
  # Security
  crypto: ^3.0.3
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.5
  clipboard: ^0.1.3
  
  # Web support
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/templates/
    - assets/animations/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
    - family: Georgia
      fonts:
        - asset: assets/fonts/Georgia-Regular.ttf
        - asset: assets/fonts/Georgia-Bold.ttf
          weight: 700
    - family: Courier
      fonts:
        - asset: assets/fonts/Courier-Prime.ttf