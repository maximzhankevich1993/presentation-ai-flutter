name: presentation_ai
description: Презентатор ИИ - создание презентаций с помощью искусственного интеллекта
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  
  # UI & Screen Adaptation
  flutter_screenutil: ^5.9.0
  
  # State Management
  provider: ^6.1.1
  
  # Networking
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Navigation
  go_router: ^13.0.0
  
  # PDF & Export
  printing: ^5.11.1
  pdf: ^3.10.7
  
  # Charts & Graphs
  fl_chart: ^0.66.0
  
  # Social Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  
  # Security
  crypto: ^3.0.3
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.5
  
  # Google Fonts (онлайн шрифты)
  google_fonts: ^6.2.1
  
  # Web support
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/templates/