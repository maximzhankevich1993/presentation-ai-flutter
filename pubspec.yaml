name: presentation_ai
description: Flutter Web приложение для создания презентаций с ИИ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_screenutil: ^5.9.0
  window_manager: ^0.3.7
  crypto: ^3.0.3
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true